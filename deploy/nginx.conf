# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration — ZCC ERP System
# Replace YOUR_DOMAIN with your actual domain (e.g. erp.zccin.org)
# SSL certificates are managed by Certbot / Let's Encrypt
# ─────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── SSL (managed by Certbot — do not edit paths manually) ─────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"             always;
    add_header X-Content-Type-Options    "nosniff"                always;
    add_header X-XSS-Protection          "1; mode=block"          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/www/zcc-erp/shared/logs/nginx-access.log;
    error_log  /var/www/zcc-erp/shared/logs/nginx-error.log warn;

    # ── API — reverse proxy to Node.js ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        client_max_body_size 20M;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # ── Uploaded files — served directly by Nginx (faster, no Node.js overhead)
    location /uploads/ {
        alias /var/www/zcc-erp/shared/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Block direct listing
        autoindex off;
    }

    # ── React frontend static files ───────────────────────────────────────────
    root /var/www/zcc-erp/app/zcceprsystem/frontend/build;
    index index.html;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
